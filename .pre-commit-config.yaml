default_install_hook_types: [pre-commit, pre-push]
fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'master']
      - id: requirements-txt-fixer

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: '1.9.4'
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml']
        additional_dependencies: ['bandit[toml]']

  - repo: local
    hooks:
      - id: validate-branch-name
        name: validate branch name (JIRA ID)
        entry: scripts/validate-branch-name.sh
        language: script
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      - id: uv-lock
        name: update lockfile (internal packages)
        entry: bash -c 'uv lock && git diff --quiet uv.lock || { echo ""; echo "uv.lock updated — run: git add uv.lock"; exit 1; }'
        language: system
        files: ^pyproject\.toml$
        pass_filenames: false
