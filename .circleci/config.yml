version: 2.1

orbs:
  sdlc: visualfabriq/sdlc@3
  codeartifact: visualfabriq/codeartifact@3

python_executor: &python_executor
  name: sdlc/python
  python-version: "3.11"

python_executor_small: &python_executor_small
  name: sdlc/python
  python-version: "3.11"
  resource-class: small

commands:
  export-uv-auth:
    description: "Export authenticated package index for uv (bridges codeartifact/init pip auth to uv)"
    steps:
      - run:
          name: Export authenticated URL for uv
          command: |
            CA_URL="${PIP_INDEX_URL:-$(pip config get global.index-url 2>/dev/null)}"

            if [ -z "$CA_URL" ]; then
              echo "No authenticated package index found"
              exit 1
            fi

            echo "export UV_INDEX_URL=$CA_URL" >> $BASH_ENV
            echo "export UV_INDEX_PRIVATE_URL=$CA_URL" >> $BASH_ENV

jobs:
  test:
    executor:
      <<: *python_executor
    steps:
      - checkout
      - codeartifact/init:
          tool: pip
      - export-uv-auth
      - sdlc/run-tests-with-coverage:
          uv-sync-group: test
          diff-coverage-threshold: 80

  publish-dev:
    executor:
      <<: *python_executor_small
    steps:
      - checkout
      - codeartifact/init:
          tool: pip
      - export-uv-auth
      - codeartifact/pre_release_version:
          package: parquery
          output-var-name: RELEASE_VERSION
          suffix: .dev
      - codeartifact/stamp-version:
          version-file: pyproject.toml
      - run:
          name: Build
          command: uv build
      - codeartifact/push:
          tool: twine

  publish-rc:
    executor:
      <<: *python_executor_small
    steps:
      - checkout
      - codeartifact/init:
          tool: pip
      - export-uv-auth
      - codeartifact/pre_release_version:
          package: parquery
          output-var-name: RELEASE_VERSION
          suffix: rc
      - codeartifact/stamp-version:
          version-file: pyproject.toml
      - run:
          name: Build
          command: uv build
      - codeartifact/push:
          tool: twine

  publish-release:
    executor:
      <<: *python_executor_small
    steps:
      - checkout
      - codeartifact/init:
          tool: pip
      - export-uv-auth
      - codeartifact/timestamp_version:
          version-file: pyproject.toml
          output-var-name: RELEASE_VERSION
      - codeartifact/stamp-version:
          version-file: pyproject.toml
      - run:
          name: Build
          command: uv build
      - codeartifact/push:
          tool: twine
      - codeartifact/create-git-release:
          version: $RELEASE_VERSION
          release-assets: "dist/*.tar.gz dist/*.whl"

  create-release-branch:
    executor:
      <<: *python_executor_small
    steps:
      - checkout
      - sdlc/create-release-branch

workflows:
  parquery:
    jobs:
      - test:
          context: [sdlc, codeartifact-dev]

      # Feature branches: opt-in dev publish
      - approve-publish-dev:
          type: approval
          requires: [test]
          filters:
            branches:
              ignore:
                - master
                - main
                - /release\/.*/
      - publish-dev:
          context: [sdlc, codeartifact-dev]
          requires: [approve-publish-dev]
          filters:
            branches:
              ignore:
                - master
                - main
                - /release\/.*/

      # Master/main: publish RC + approval-gated release-branch creation
      - publish-rc:
          context: [sdlc, codeartifact-dev]
          requires: [test]
          filters:
            branches:
              only: [master, main]
      - approve-create-release-branch:
          type: approval
          requires: [publish-rc]
          filters:
            branches:
              only: [master, main]
      - create-release-branch:
          context: [sdlc, codeartifact-dev]
          requires: [approve-create-release-branch]
          filters:
            branches:
              only: [master, main]

      # Release branches: publish final + create GitHub release
      - publish-release:
          context: [sdlc, codeartifact-dev]
          requires: [test]
          filters:
            branches:
              only: /release\/.*/
