version: 2.1

orbs:
  sdlc: visualfabriq/sdlc@3
  codeartifact: visualfabriq/codeartifact@3

python_executor: &python_executor
  name: sdlc/python
  python-version: "3.11"

python_executor_small: &python_executor_small
  name: sdlc/python
  python-version: "3.11"
  resource-class: small

commands:
  export-uv-auth:
    description: "Export authenticated package index for uv (bridges codeartifact/init pip auth to uv)"
    steps:
      - run:
          name: Export authenticated URL for uv
          command: |
            CA_URL="${PIP_INDEX_URL:-$(pip config get global.index-url 2>/dev/null)}"

            if [ -z "$CA_URL" ]; then
              echo "No authenticated package index found"
              exit 1
            fi

            echo "export UV_INDEX_URL=$CA_URL" >> $BASH_ENV
            echo "export UV_INDEX_PRIVATE_URL=$CA_URL" >> $BASH_ENV

jobs:
  test:
    executor:
      <<: *python_executor
    steps:
      - checkout
      - codeartifact/init:
          tool: pip
      - export-uv-auth
      - sdlc/run-tests-with-coverage:
          uv-sync-group: test
          diff-coverage-threshold: 80

  test-arm64:
    executor:
      name: sdlc/python
      python-version: "3.11"
      resource-class: arm.medium
    steps:
      - checkout
      - codeartifact/init:
          tool: pip
      - export-uv-auth
      - sdlc/run-tests-with-coverage:
          uv-sync-group: test
          diff-coverage-threshold: 80

  publish-dev:
    executor:
      <<: *python_executor_small
    steps:
      - checkout
      - codeartifact/init:
          tool: pip
      - export-uv-auth
      - codeartifact/pre_release_version:
          package: parquery
          output-var-name: RELEASE_VERSION
          suffix: .dev
      - codeartifact/stamp-version:
          version-file: pyproject.toml
      - run:
          name: Build
          command: uv build
      - codeartifact/push:
          tool: twine

  publish-package:
    executor:
      <<: *python_executor_small
    steps:
      - checkout
      - codeartifact/init:
          tool: pip
      - export-uv-auth
      - codeartifact/timestamp_version:
          version-file: pyproject.toml
          output-var-name: RELEASE_VERSION
      - codeartifact/stamp-version:
          version-file: pyproject.toml
      - run:
          name: Build
          command: uv build
      - codeartifact/push:
          tool: twine
      - codeartifact/create-git-release:
          version: $RELEASE_VERSION
          release-assets: "dist/*.tar.gz dist/*.whl"

workflows:
  parquery:
    jobs:
      - test:
          context: [sdlc, codeartifact-dev]
      - test-arm64:
          context: [sdlc, codeartifact-dev]

      # Test runs on main + release-vN.M hotfix branches. release-v<MAJOR>.<MINOR>
      # branches publish MAJOR.MINOR.TIMESTAMP from their own pyproject.toml. See
      # docs/sdlc/sdlc-cicd-guide-backend.md §4b "CI workflow filters for hotfix
      # branches" and "Governance for hotfix publishes".

      # main auto-publishes — its gate is the reviewed PR merge
      - publish-package:
          context: [sdlc, codeartifact-dev]
          requires: [test, test-arm64]
          filters:
            branches:
              only: main

      # release-vN.M publishes only after a manual approval, on top of the
      # required PR review (branch protection on release-v*)
      - approve-release-publish:
          type: approval
          requires: [test, test-arm64]
          filters:
            branches:
              only: /^release-v\d+\.\d+$/
      - publish-package:
          name: publish-package-release
          context: [sdlc, codeartifact-dev]
          requires: [approve-release-publish]
          filters:
            branches:
              only: /^release-v\d+\.\d+$/

      - approve-publish-dev:
          type: approval
          filters:
            branches:
              ignore:
                - main
                - /^release-v\d+\.\d+$/
      - publish-dev:
          context: [sdlc, codeartifact-dev]
          requires: [approve-publish-dev]
          filters:
            branches:
              ignore:
                - main
                - /^release-v\d+\.\d+$/
